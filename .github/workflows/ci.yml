name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data (needed for downstream tests)
        run: |
          python -m src.data.simulate_macro
          python -m src.data.simulate_ledger --n-accounts 100 --months 24

      - name: Run tests
        run: pytest -q
