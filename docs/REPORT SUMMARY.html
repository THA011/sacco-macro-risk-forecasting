function renderSidebar() {
    const menu = document.getElementById('sidebarMenu');
    menu.innerHTML = PROJECT_DATA.sections.map(s => `
        <li class="sidebar-item" data-section="${s.id}">
            <a href="#" onclick="navigateTo('${s.id}')">
                <i class="fas ${s.icon}"></i> ${s.label}
            </a>
        </li>
    `).join('');
}

function renderContent(sectionId) {
    const section = PROJECT_DATA.sections.find(s => s.id === sectionId) || PROJECT_DATA.sections[0];
    const container = document.getElementById('dynamicContent');
    container.innerHTML = section.content;
    document.getElementById('currentSectionTitle').textContent = section.label;
    // Update active sidebar
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    const activeItem = document.querySelector(`.sidebar-item[data-section="${section.id}"]`);
    if (activeItem) activeItem.classList.add('active');
    // Update breadcrumb
    document.querySelector('.breadcrumb a').textContent = 'Home';
    document.querySelector('.breadcrumb a').href = '#home';
    // Scroll to top
    document.querySelector('.main-content').scrollTop = 0;
}

function navigateTo(sectionId) {
    window.location.hash = sectionId;
    renderContent(sectionId);
}

    const blocks = container.querySelectorAll('.qa-block, p, li, h2, h3, h4, pre, ul, ol');
    blocks.forEach(block => {
        const text = block.textContent.toLowerCase();
        if (text.includes(query)) {
            block.style.display = '';
        } else {
            block.style.display = 'none';
        }
    });
}

function exportPortal() {
    const content = document.documentElement.outerHTML;
    const blob = new Blob([content], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'THA011_Macro_Risk_Portal.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// ===================================================================
// INIT
// ===================================================================

document.addEventListener('DOMContentLoaded', function() {
    renderSidebar();
    const hash = window.location.hash.replace('#', '') || 'home';
    navigateTo(hash);
    // Set up copy buttons on pre blocks
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('copy-btn')) {
            const code = e.target.closest('pre').querySelector('code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                e.target.textContent = 'Copied!';
                setTimeout(() => e.target.textContent = 'Copy', 1500);
            });
        }
    });
});

// Simple dark mode toggle (for demonstration)
function toggleDarkMode() {
    document.body.style.backgroundColor = document.body.style.backgroundColor === '#1e293b' ? '' : '#1e293b';
    document.body.style.color = document.body.style.color === '#e2e8f0' ? '' : '#e2e8f0';
    // Additional styles can be applied here.
}

// Add copy buttons to pre blocks
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        pre.appendChild(btn);
    });
});
